# MacBook8,1: the DesignWare DMA engine on the Broadwell LPSS does not work with
# the Apple SPI keyboard/trackpad controller (spi-pxa2xx @ 0000:00:15.4).
# When dw_dmac loads before the SPI driver requests channels, all SPI transfers
# time out (-110) and the internal keyboard/trackpad are dead for the whole boot.
# Blacklisting it forces the always-working PIO fallback path.
# See: journalctl -k | grep 'no DMA channels available, using PIO'  (= healthy)
blacklist dw_dmac
