# MacBook8,1: raw ALSA sink LOCKED to 16-bit / 4-channel / 48kHz on the CS4208.
# Uses the STABLE card id (PCH) — ALSA card NUMBERS swap with HDMI across boots,
# which is what crashed PipeWire (hw:1,0 pointed at HDMI, no device 0).
context.objects = [
  {
    factory = adapter
    args = {
      factory.name       = api.alsa.pcm.sink
      node.name          = "mb81.hw.out"
      node.description   = "Internal Speakers HW (4ch/16bit)"
      media.class        = Audio/Sink
      api.alsa.path      = "hw:CARD=PCH,DEV=0"
      audio.format       = "S16LE"
      audio.rate         = 48000
      audio.channels     = 4
      audio.position     = [ FL FR RL RR ]
      api.alsa.period-size = 1024
      api.alsa.headroom    = 1024
      node.pause-on-idle   = false
      session.suspend-timeout-seconds = 0
      priority.session     = 100
    }
  }
]
