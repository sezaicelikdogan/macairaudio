# MacBook8,1: virtual STEREO sink "Internal Speakers" (GNOME volume slider) whose
# audio is UPMIXED to 4 channels and sent to the raw 16-bit/4ch hardware node
# (mb81.hw.out). The playback side is forced to 4 channels so the amp's TDM slots
# are always fed (a 2-channel loopback = silent speakers).
context.modules = [
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Internal Speakers"
      capture.props = {
        node.name        = "mb81.speakers"
        node.description  = "Internal Speakers"
        media.class       = Audio/Sink
        audio.channels    = 2
        audio.position    = [ FL FR ]
        node.want-driver  = true
        session.suspend-timeout-seconds = 0
      }
      playback.props = {
        node.name         = "mb81.speakers.playback"
        node.description   = "Internal Speakers (to hw)"
        audio.channels     = 4
        audio.position     = [ FL FR RL RR ]
        target.object      = "mb81.hw.out"
        node.dont-reconnect = false
        stream.dont-remix   = false
        node.passive        = true
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
